<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIPHORIX | Absensi Sederhana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="absensi-container">
        <div class="absensi-header">
            <a href="index.html" class="back-btn">← Kembali</a>
            <h1>📋 ABSENSI HARI INI</h1>
            <div class="live-clock">--:--:--</div>
        </div>

        <div class="date-info">
            <div id="full-date-indo">Memuat...</div>
        </div>

        <div class="form-card">
            <h2>✍️ Catat Absen</h2>
            <select id="pilih-siswa" class="siswa-select">
                <option value="">Pilih Siswa</option>
            </select>
            <div class="status-pilihan">
                <button id="status-hadir" class="status-option hadir-opt">✅ Hadir</button>
                <button id="status-izin" class="status-option izin-opt">📝 Izin</button>
                <button id="status-alfa" class="status-option alfa-opt">❌ Alfa</button>
            </div>
        </div>

        <div class="log-card">
            <h3>📋 Daftar Absen Hari Ini</h3>
            <div class="table-wrapper">
                <table id="log-table">
                    <thead>
                        <tr><th>No</th><th>Nama</th><th>Waktu</th><th>Status</th></tr>
                    </thead>
                    <tbody id="log-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast-message" class="toast"></div>
    <script src="script.js"></script>
</body>
</html>
